<!DOCTYPE html>
<html>
<head>
<title>Untuk Nita Putri Sari Siregar ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
background:white;
color:black;
min-height:100vh;
overflow-x:hidden;
}

/* posisi slide */
.slide{
margin-top:200px;
}

/* tombol */
button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff1e4d;
}

/* pesan */
#pesan{
display:none;
margin-top:40px;
}

/* box pesan */
.box{
background:rgba(255,255,255,0.2);
padding:30px;
border-radius:20px;
width:60%;
margin:auto;
font-size:20px;
line-height:1.6;
}

/* foto */
.foto{
width:220px;
border-radius:20px;
margin-bottom:20px;
}

/* animasi jatuh */
@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<body>

<!-- SLIDE 1 -->
<div id="hal1" class="slide">
<h1>🙂</h1>
<button onclick="hal2()">Tekan</button>
</div>

<!-- SLIDE 2 -->
<div id="hal2" class="slide" style="display:none;">
<h1>🤔</h1>
<button onclick="hal3()">Hayoooo kenapa ditekan</button>
</div>

<!-- SLIDE 3 -->
<div id="hal3" class="slide" style="display:none;">
<h1>😜</h1>
<button onclick="hal4()">Anda Kena Prank</button>
</div>

<!-- SLIDE 4 -->
<div id="hal4" class="slide" style="display:none;">
<h1>🙏</h1>
<button onclick="hal5()">Tolong tekan sekali lagi please</button>
</div>

<!-- SLIDE 5 -->
<div id="hal5" class="slide" style="display:none;">
<h1>💌</h1>
<button onclick="bukaPesan()">Buka Pesan Cinta ❤️</button>
</div>

<!-- AUDIO -->
<audio id="musik">
<source src="musik.mp3" type="audio/mpeg">
</audio>

<!-- PESAN -->
<div id="pesan">

<h1>❤️ Untuk Nita Putri Sari Siregar ❤️</h1>

<div class="box">

<img src="nita.jpg" class="foto">

<p>
Nita Putri Sari Siregar,
dari sekian banyak orang di dunia ini,
hatiku selalu menemukan jalannya kembali kepadamu.
</p>

<p>
Senyummu sederhana tapi selalu berhasil
membuat hariku terasa lebih indah.
</p>

<p>
Terima kasih sudah hadir dalam hidupku.
</p>

<p id="typing"></p>

</div>

</div>

<script>

/* pindah slide */

function hal2(){
document.getElementById("hal1").style.display="none";
document.getElementById("hal2").style.display="block";
}

function hal3(){
document.getElementById("hal2").style.display="none";
document.getElementById("hal3").style.display="block";
}

function hal4(){
document.getElementById("hal3").style.display="none";
document.getElementById("hal4").style.display="block";
}

function hal5(){
document.getElementById("hal4").style.display="none";
document.getElementById("hal5").style.display="block";
}

/* buka pesan */

let animasiMulai=false;

function bukaPesan(){

document.getElementById("hal5").style.display="none";
document.getElementById("pesan").style.display="block";

/* ubah background romantis */
document.body.style.background="linear-gradient(45deg,#ff6a88,#ff99ac,#ffc3d1)";
document.body.style.color="white";

/* putar musik */
var music=document.getElementById("musik");
music.play();

/* mulai mengetik */
ketik();

/* mulai animasi bunga dan love */
if(!animasiMulai){

setInterval(createHeart,400);
setInterval(createFlower,600);

animasiMulai=true;

}

}

/* teks mengetik */

const text="Aku sayang kamu Nita ❤️";
let i=0;

function ketik(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(ketik,70);
}
}

/* love jatuh */

function createHeart(){

const heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="fixed";
heart.style.top="-50px";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*20)+"px";
heart.style.animation="fall 6s linear";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);

}

/* bunga jatuh */

function createFlower(){

const flower=document.createElement("div");

flower.innerHTML="🌸";

flower.style.position="fixed";
flower.style.top="-50px";
flower.style.left=Math.random()*100+"vw";
flower.style.fontSize=(20+Math.random()*20)+"px";
flower.style.animation="fall 7s linear";

document.body.appendChild(flower);

setTimeout(()=>{flower.remove();},7000);

}

</script>

</body>
</html>
